<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrED Factory</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="shape shape-circle-1"></div>
    <div class="shape shape-circle-2"></div>
    <div class="shape shape-circle-3"></div>
    <div class="shape shape-rectangle-1"></div>

    <div class="menu">
        <div class="logo">
            <button id="logo_btn">
                <img src="/static/fred_logo.png" alt="FrED Factory logo">
            </button>
            <button id="name_btn">FrED Factory</button>
        </div>
        <nav class="menu_buttons">
            <button id="home_btn">HOME</button>
            <button id="services_btn">SERVICES</button>
            <button id="calendar_btn">CALENDAR</button>
            <button id="account_btn">ACCOUNT</button>
            <button id="login_btn">LOGIN</button>
            <img src="/static/TEC_logo.png" alt="Tec de Monterrey logo">
        </nav>
    </div>

    <div class="home_container">
        <header id="welcome_header">
                Welcome to &nbsp&nbsp&nbsp&nbsp&nbspFrED Factory            
        </header>
        <section id="welcome_section">
                Building the future of industry, today.
        </section>
        <div id="sign_up_container">
            <img id="welcome_img" src="/static/FrED_nano_CAD.png" alt="FrED nano CAD">
            <div id="sign_up">
                <div class="identification">
                    <div id="name_container">
                        <h1>
                            Enter your name
                        </h1>
                        <input id="name_input" type="text" placeholder="Required field**">
                    </div>
                    <div id="last_name_container">
                        <h1>
                            Enter your last name
                        </h1>
                        <input id="last_name_input" type="text" placeholder="Required field**">
                    </div>
                </div>
                <div class="identification">
                    <div>
                        <h1>
                            Enter your organization
                        </h1>
                        <input id="organization_input" type="text" placeholder="Required field**">
                    </div>
                    <div>
                        <h1>
                            Enter your phone number
                        </h1>
                        <input id="phone_input" type="tel">
                    </div>
                </div>
                <h1>
                    Enter a username
                </h1>
                <input id="user_name_input" type="text" placeholder="Required field**">
                <h1>
                    Enter your email
                </h1>
                <input id="sign_up_email" type="email" placeholder="Required field**">
                <h1>
                        Enter your password
                </h1>
                <div class="wrap_password">
                    <input id="input_pass" type="password" placeholder="Required field**">
                    <span class="see_img" id="show_pass" title="Show/Hide password">
                        <img src="/static/closed_eye.png" alt="show password">
                    </span>
                </div>
                <h1>
                    Confirm your password
                </h1>
                <div class="wrap_password">
                    <input id="input_pass_conf" type="password" placeholder="Required field**">
                    <span class="see_img" id="show_confirm_pass" title="Show/Hide password">
                        <img src="/static/closed_eye.png" alt="show password">
                    </span>
                </div>
                <button id="submit_sign_up">
                    SIGN UP
                </button>
                <div id="sec_login">
                    <p>Already have an account?</p>
                    <button id="sec_login_btn">
                        Log in
                    </button>

                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
    
</body>
</html>
