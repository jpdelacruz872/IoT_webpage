<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrED Factory</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="shape shape-circle-1"></div>
    <div class="shape shape-circle-2"></div>
    <div class="shape shape-circle-3"></div>
    <div class="shape shape-rectangle-1"></div>

    <div class="menu">
        <div class="logo">
            <button id="logo_btn">
                <img src="/static/fred_logo.png" alt="FrED Factory logo">
            </button>
            <button id="name_btn">FrED Factory</button>
        </div>
        <nav class="menu_buttons">
            <button id="home_btn">HOME</button>
            <button id="services_btn">SERVICES</button>
            <button id="calendar_btn">CALENDAR</button>
            <button id="account_btn">ACCOUNT</button>
            <button id="login_btn">LOGIN</button>
            <img src="/static/TEC_logo.png" alt="Tec de Monterrey logo">
        </nav>
    </div>

    <div class="home_container">
        <header id="welcome_header">
                Welcome to &nbsp&nbsp&nbsp&nbsp&nbspFrED Factory            
        </header>
        <section id="welcome_section">
                Building the future of industry, today.
        </section>
        <div id="login_container">
            <img id="welcome_img" src="/static/FrED_nano_CAD.png" alt="FrED nano CAD">
            <div id="login">
                <header>
                    <h1>Enter your email or username</h1>
                </header>
                <input id="email_or_user_input" type="text", placeholder="Required field**">
                <header>
                    <h1>Enter your password</h1>
                </header>
                <div class="wrap_password">
                    <input id="input_pass" type="password" placeholder="Required field**">
                    <span class="see_img" id="show_pass" title="Show/Hide password">
                        <img src="/static/closed_eye.png" alt="show password">
                    </span>
                </div>
                <button id="submit_log_in">
                    LOG IN
                </button>
                <div id="sec_sign_up">
                    <p>Don't have an account?</p>
                    <button id="sign_up_btn">
                        Sign up
                    </button>

                </div>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
    
</body>
</html>
